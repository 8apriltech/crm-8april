<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Ordens de Serviço</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

<style>
body {
  font-family: 'Segoe UI', sans-serif;
  background: #0b1220;
  color: #e2e8f0;
  padding: 30px;
}

.header {
  display: flex;
  align-items: center;
  gap: 15px;
  margin-bottom: 30px;
}

.header img {
  height: 50px;
}

.dashboard {
  display: flex;
  gap: 20px;
  margin-bottom: 20px;
}

.card {
  background: #111827;
  padding: 20px;
  border-radius: 12px;
  min-width: 180px;
  box-shadow: 0 0 20px rgba(0,0,0,0.3);
}

.card h3 {
  font-size: 13px;
  color: #9ca3af;
  text-transform: uppercase;
  letter-spacing: 1px;
}

.card p {
  font-size: 32px;
  font-weight: bold;
  margin-top: 5px;
}

/* FILTROS */
.filtros {
  background: #111827;
  padding: 15px;
  border-radius: 12px;
  margin-bottom: 20px;
}

input, select {
  padding: 10px;
  margin: 5px;
  border-radius: 8px;
  border: none;
  background: #1f2937;
  color: white;
}

button {
  padding: 10px 15px;
  border-radius: 8px;
  border: none;
  background: #2563eb;
  color: white;
  cursor: pointer;
}

.delete-btn {
  background: #ef4444;
}

table {
  width: 100%;
  border-collapse: collapse;
  background: #111827;
}

th {
  background: #1f2937;
  padding: 12px;
  cursor: pointer;
}

td {
  padding: 12px;
  border-top: 1px solid #1f2937;
}

.nova-os {
  background: linear-gradient(145deg, #111827, #0f172a);
  padding: 25px;
  border-radius: 16px;
  margin: 30px 0;
  box-shadow: 0 0 25px rgba(0,0,0,0.4);
  border: 1px solid #1f2937;
}

.nova-os h2 {
  margin-bottom: 15px;
  font-size: 18px;
}

.nova-os form {
  display: flex;
  flex-wrap: wrap;
  gap: 10px;
}

.grafico-box {
  background: #111827;
  padding: 25px;
  border-radius: 16px;
  margin-bottom: 30px;
  box-shadow: 0 0 25px rgba(0,0,0,0.4);
}

.topo {
  display: flex;
  gap: 20px;
  align-items: stretch;
  margin-bottom: 30px;
}

/* cards na vertical */
.dashboard {
  display: flex;
  flex-direction: column;
  gap: 20px;
  min-width: 250px;
}

/* gráfico ocupa o resto */
.grafico-box {
  flex: 1;
  background: #111827;
  padding: 16px;
  border-radius: 18px;
}

/* limita altura do gráfico */
#graficoFaturamento {
  max-height: 200px !important;
}

</style>
</head>

<body>

<div class="header">
  <img src="https://i.ibb.co/kRQ2V5Q/Logo-Novas.png">
  <h1>Ordens de Serviço</h1>
</div>

<div class="topo">

  <div class="dashboard">
    <div class="card">
      <h3>Total OS</h3>
      <p id="totalOS">0</p>
    </div>

    <div class="card">
      <h3>Faturamento</h3>
      <p id="totalValor">R$ 0,00</p>
    </div>
  </div>

  <div class="grafico-box">
    <h2>📈 Faturamento por Data</h2>
    <canvas id="graficoFaturamento"></canvas>
  </div>

</div>

<div class="nova-os">
  <h2>➕ Nova Ordem de Serviço</h2>

  <form id="formOS">
  <input id="nome" placeholder="Nome" required>
  <input id="servico" placeholder="Serviço">
  <input id="valor" type="number" placeholder="Valor">
  <input id="data_entrega" type="date">

  <select id="status">
    <option>Pendente</option>
    <option>Pago</option>
  </select>

  <button type="submit">Salvar</button>
</form>
</div>

<!-- 🔎 FILTROS -->
<div class="filtros">
  <input id="busca" placeholder="🔍 Buscar cliente ou serviço">

  <select id="filtroStatus">
    <option value="">Todos Status</option>
    <option>Pendente</option>
    <option>Pago</option>
  </select>

  <input type="date" id="dataInicio">
  <input type="date" id="dataFim">

  <button onclick="carregarDados()">Filtrar</button>
</div>

<table>
  <thead>
    <tr>
      <th onclick="ordenar('nome')">Nome</th>
      <th onclick="ordenar('servico')">Serviço</th>
      <th onclick="ordenar('valor')">Valor</th>
      <th onclick="ordenar('data_entrega')">Data</th>
      <th>Status</th>
      <th></th>
    </tr>
  </thead>
  <tbody id="tabelaOS"></tbody>
</table>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<script>

const client = supabase.createClient(
  "https://exrvjejlhtdjdhcuzwth.supabase.co",
  "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImV4cnZqZWpsaHRkamRoY3V6d3RoIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzA0MTk2NDQsImV4cCI6MjA4NTk5NTY0NH0.Jd_gn8bvcDyw5RjiXIL5FePT6mTg6B1tDbBKw-hRakc"
);

let colunaAtual = "created_at";
let ordemAsc = false;

const formatarMoeda = v =>
  Number(v || 0).toLocaleString("pt-BR", { style: "currency", currency: "BRL" });

const formatarData = d =>
  d ? new Date(d).toLocaleDateString("pt-BR") : "-";

async function carregarDados() {
  let query = client
    .from("ordens_servico")
    .select("*")
    .order(colunaAtual, { ascending: ordemAsc });

  const busca = document.getElementById("busca").value.toLowerCase();
  const status = document.getElementById("filtroStatus").value;
  const inicio = document.getElementById("dataInicio").value;
  const fim = document.getElementById("dataFim").value;

  if (status) query = query.eq("status", status);
  if (inicio) query = query.gte("data_entrega", inicio);
  if (fim) query = query.lte("data_entrega", fim);

  const { data } = await query;

  const tabela = document.getElementById("tabelaOS");
  tabela.innerHTML = "";

  let total = 0;

  data
    .filter(item =>
      item.nome?.toLowerCase().includes(busca) ||
      item.servico?.toLowerCase().includes(busca)
    )
    .forEach(item => {
      const st = item.status || "Pendente";
      total += Number(item.valor || 0);

      tabela.innerHTML += `
        <tr>
          <td>${item.nome}</td>
          <td>${item.servico}</td>
          <td>${formatarMoeda(item.valor)}</td>
          <td>${formatarData(item.data_entrega)}</td>
          <td>
            <select onchange="atualizarStatus('${item.id}', this.value)">
              <option ${st==="Pendente"?"selected":""}>Pendente</option>
              <option ${st==="Pago"?"selected":""}>Pago</option>
            </select>
          </td>
          <td>
            <button class="delete-btn" onclick="excluir('${item.id}')">Excluir</button>
          </td>
        </tr>
      `;
    });

  document.getElementById("totalOS").innerText = data.length;
  document.getElementById("totalValor").innerText = formatarMoeda(total);
  gerarGrafico(data);
}

function ordenar(coluna) {
  if (colunaAtual === coluna) ordemAsc = !ordemAsc;
  else {
    colunaAtual = coluna;
    ordemAsc = true;
  }
  carregarDados();
}

document.getElementById("formOS").addEventListener("submit", async e => {
  e.preventDefault();

  await client.from("ordens_servico").insert([{
    nome: nome.value,
    servico: servico.value,
    valor: valor.value,
    status: status.value,
    data_entrega: data_entrega.value
  }]);

  formOS.reset();
  carregarDados();
});

async function excluir(id) {
  if (!confirm("Excluir?")) return;
  await client.from("ordens_servico").delete().eq("id", id);
  carregarDados();
}

async function atualizarStatus(id, s) {
  await client.from("ordens_servico").update({ status: s }).eq("id", id);
}

carregarDados();

let grafico;

function gerarGrafico(data) {
  const agrupado = {};

  data.forEach(item => {
    if (!item.data_entrega) return;

    const dataObj = new Date(item.data_entrega);

    const mes = dataObj.toLocaleDateString("pt-BR", {
      year: "numeric",
      month: "2-digit"
    });

    if (!agrupado[mes]) {
      agrupado[mes] = 0;
    }

    agrupado[mes] += Number(item.valor || 0);
  });

  const labels = Object.keys(agrupado).sort((a, b) => {
  const [mesA, anoA] = a.split('/');
  const [mesB, anoB] = b.split('/');

  const dataA = new Date(`${anoA}-${mesA}-01`);
  const dataB = new Date(`${anoB}-${mesB}-01`);

  return dataB - dataA;
});
  const valores = labels.map(l => agrupado[l]);

  const ctx = document.getElementById('graficoFaturamento').getContext('2d');

  if (grafico) grafico.destroy();

  grafico = new Chart(ctx, {
    type: 'line',
    data: {
      labels: labels,
      datasets: [{
        label: 'Faturamento por mês',
        data: valores,
        borderWidth: 3,
        tension: 0.4,
        fill: true,
        borderColor: '#3b82f6',
        backgroundColor: 'rgba(59,130,246,0.2)',
        pointBackgroundColor: '#3b82f6'
        }]
    },
    options: {
      plugins: {
        legend: {
          labels: { color: '#fff' }
        }
      },
      scales: {
        x: {
          ticks: { color: '#fff' }
        },
        y: {
          ticks: { color: '#fff' }
        }
      }
    }
  });
}

</script>

</body>
</html>
