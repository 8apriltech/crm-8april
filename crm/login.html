<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Login · CRM 8April</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background: #020617;
            color: #f8fafc;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
        }

        .login-box {
            background: #020617;
            border: 1px solid #1e293b;
            border-radius: 14px;
            padding: 32px;
            width: 340px;
            box-shadow: 0 0 30px rgba(0,0,0,.4);
        }

       .logo {
            display: block;
            margin: 0 auto 20px auto;
            width: 100%;
            max-width: 500px;
            object-fit: contain;
        }       


        h1 {
            text-align: center;
            margin-bottom: 6px;
            color: #38bdf8;
            font-size: 22px;
        }

        .subtitle {
            text-align: center;
            font-size: 13px;
            color: #94a3b8;
            margin-bottom: 22px;
        }

        label {
            font-size: 13px;
            color: #94a3b8;
        }

        input {
            width: 100%;
            padding: 11px;
            margin: 6px 0 16px 0;
            border-radius: 8px;
            border: 1px solid #334155;
            background: #020617;
            color: #f8fafc;
            box-sizing: border-box;
        }

        button {
            width: 100%;
            padding: 11px;
            border-radius: 8px;
            border: none;
            background: #38bdf8;
            color: #020617;
            font-weight: bold;
            cursor: pointer;
            font-size: 14px;
        }

        button:hover {
            opacity: 0.9;
        }

        .error {
            margin-top: 14px;
            color: #f87171;
            font-size: 13px;
            text-align: center;
            display: none;
        }
    </style>
</head>
<body>

<div class="login-box">

    <img 
        src="https://i.ibb.co/cKLybywf/Chat-GPT-Image-23-de-dez-de-2025-10-33-35.png" 
        alt="Logo 8April"
        class="logo"
    >

    <h1>8April CRM</h1>
    <div class="subtitle">Bem-vindo ao CRM da 8April Tech!</div>

    <label>Email</label>
    <input type="email" id="email" placeholder="seu@email.com">

    <label>Senha</label>
    <input type="password" id="password" placeholder="••••••••">

    <button onclick="login()">Entrar</button>

    <div class="error" id="error">Credenciais inválidas</div>
</div>

<script>
async function login() {
    const email = document.getElementById("email").value;
    const password = document.getElementById("password").value;
    const errorBox = document.getElementById("error");

    errorBox.style.display = "none";

    const resp = await fetch("/api/login", {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify({ email, password })
    });

    if (!resp.ok) {
        errorBox.style.display = "block";
        return;
    }

    const data = await resp.json();

    localStorage.setItem("token", data.access_token);
    localStorage.setItem("user_email", email);
    window.location.href = "/";
}
</script>

</body>
</html>
